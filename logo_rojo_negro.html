<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logo Letras</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,700&family=Cormorant+Garamond:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000000;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .logo {
    text-align: center;
    animation: fadeIn 1.4s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .main-name {
    font-family: 'Playfair Display', serif;
    font-size: 88px;
    font-weight: 900;
    letter-spacing: 18px;
    color: #cc0000;
    text-transform: uppercase;
    line-height: 1;
    text-shadow: 0 0 40px rgba(200,0,0,0.4);
  }

  .divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin: 14px 0;
  }

  .line {
    width: 80px;
    height: 1px;
    background: linear-gradient(to right, transparent, #cc0000aa);
  }
  .line.r {
    background: linear-gradient(to left, transparent, #cc0000aa);
  }

  .dot {
    width: 5px;
    height: 5px;
    background: #cc0000;
    border-radius: 50%;
    box-shadow: 0 0 8px #cc0000;
  }

  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    letter-spacing: 10px;
    color: #ffffff;
    text-transform: uppercase;
    opacity: 0.85;
  }
</style>
</head>
<body>
  <div class="logo">
    <div class="main-name">La Mesa</div>
    <div class="divider">
      <div class="line"></div>
      <div class="dot"></div>
      <div class="line r"></div>
    </div>
    <div class="tagline">Cocina de autor</div>
  </div>
</body>
</html>
